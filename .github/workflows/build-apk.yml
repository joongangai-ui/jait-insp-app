name: Build APK

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Gradle 8.7
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle-8.7-bin.zip

      - name: Generate wrapper
        run: ./gradle-8.7/bin/gradle wrapper --gradle-version 8.7

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p out
          cp app/build/outputs/apk/debug/app-debug.apk "out/JAIT-PMS.apk"

      - name: Upload APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: JAIT-PMS-apk
          path: out/JAIT-PMS.apk
          if-no-files-found: error

      - name: Publish Release (public download)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.2.0
          name: JAIT PMS v1.2.0
          files: out/JAIT-PMS.apk
